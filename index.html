<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Criperman: Cripcoin Sim</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #0b0e17;
  --panel:   #111520;
  --card:    #161b28;
  --border:  #1f2a3d;
  --border2: #263044;
  --green:   #0ecb81;
  --red:     #f6465d;
  --blue:    #1677ff;
  --yellow:  #f0b90b;
  --text:    #eaecef;
  --muted:   #5e6673;
  --muted2:  #848e9c;
  --font-mono: 'JetBrains Mono', monospace;
  --font:     'Inter', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 0;
  overflow-x: hidden;
}

/* ── TOP BAR ── */
.topbar {
  width: 100%; max-width: 520px;
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  background: var(--panel);
}
.tb-symbol {
  font-family: var(--font-mono);
  font-weight: 700; font-size: 15px; color: var(--text);
  display: flex; align-items: center; gap: 6px;
}
.tb-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); animation: blink 1.4s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
.tb-price {
  font-family: var(--font-mono);
  font-size: 18px; font-weight: 700; margin-left: 4px;
  transition: color 0.25s;
}
.tb-change {
  font-family: var(--font-mono);
  font-size: 12px; font-weight: 600;
  padding: 3px 8px; border-radius: 4px;
}
.tb-change.up   { color: var(--green); background: rgba(14,203,129,0.1); }
.tb-change.down { color: var(--red);   background: rgba(246,70,93,0.1); }
.tb-right { margin-left: auto; display: flex; gap: 6px; align-items: center; }
.rank-badge {
  font-family: var(--font-mono);
  font-size: 10px; font-weight: 700; letter-spacing: 0.06em;
  padding: 4px 10px; border-radius: 4px;
  background: rgba(22,119,255,0.15); color: #4096ff;
  border: 1px solid rgba(22,119,255,0.25);
}
.icon-btn {
  width: 32px; height: 32px; border-radius: 6px;
  background: var(--card); border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; cursor: pointer; position: relative;
  transition: background 0.15s, border-color 0.15s;
}
.icon-btn:hover { background: var(--border); }
.ach-dot {
  position: absolute; top: -3px; right: -3px;
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--yellow); display: none;
  box-shadow: 0 0 6px var(--yellow);
}
.ach-dot.on { display: block; }
.pause-btn {
  font-family: var(--font-mono); font-size: 11px; font-weight: 600;
  padding: 5px 12px; border-radius: 5px;
  background: var(--card); border: 1px solid var(--border);
  color: var(--muted2); cursor: pointer;
  transition: background 0.15s;
}
.pause-btn:hover { background: var(--border); color: var(--text); }

/* ── TICKER ROW ── */
.ticker-row {
  width: 100%; max-width: 520px;
  display: flex; gap: 0;
  background: var(--panel);
  border-bottom: 1px solid var(--border);
  overflow-x: auto;
  scrollbar-width: none;
}
.ticker-row::-webkit-scrollbar { display: none; }
.ticker-item {
  flex-shrink: 0;
  padding: 7px 16px;
  border-right: 1px solid var(--border);
  font-size: 11px;
}
.ti-name { color: var(--muted2); font-weight: 600; margin-bottom: 2px; }
.ti-val  { font-family: var(--font-mono); font-size: 12px; font-weight: 700; }
.ti-chg  { font-size: 10px; font-family: var(--font-mono); }
.up   { color: var(--green); }
.down { color: var(--red); }

/* ── CHART AREA ── */
.chart-section {
  width: 100%; max-width: 520px;
  background: var(--panel);
  border-bottom: 1px solid var(--border);
  position: relative;
}
.chart-controls {
  display: flex; align-items: center; gap: 2px;
  padding: 8px 12px 6px;
}
.tf-btn {
  font-family: var(--font-mono); font-size: 11px; font-weight: 600;
  padding: 3px 8px; border-radius: 4px; border: none;
  background: transparent; color: var(--muted);
  cursor: pointer; transition: all 0.15s;
}
.tf-btn.active, .tf-btn:hover { background: var(--border); color: var(--text); }
.chart-type-btn {
  margin-left: auto;
  font-family: var(--font-mono); font-size: 11px; font-weight: 600;
  padding: 3px 10px; border-radius: 4px; border: 1px solid var(--border);
  background: var(--card); color: var(--muted2); cursor: pointer;
}
.chart-type-btn:hover { color: var(--text); }

/* CANDLESTICK CANVAS */
.candle-wrap {
  position: relative;
  height: 220px;
  width: 100%;
  cursor: crosshair;
}
#candleCanvas {
  position: absolute; inset: 0;
  width: 100% !important; height: 100% !important;
}
/* Crosshair price label */
.price-label {
  position: absolute;
  right: 0;
  font-family: var(--font-mono);
  font-size: 10px;
  background: var(--blue);
  color: #fff;
  padding: 1px 6px;
  border-radius: 2px;
  pointer-events: none;
  display: none;
  transform: translateY(-50%);
  white-space: nowrap;
}

/* Volume bars */
.vol-wrap {
  position: relative; height: 44px;
  border-top: 1px solid var(--border);
  overflow: hidden;
}
#volCanvas {
  position: absolute; inset: 0;
  width: 100% !important; height: 100% !important;
}

/* ── STATS STRIP ── */
.stats-strip {
  width: 100%; max-width: 520px;
  display: grid; grid-template-columns: repeat(4, minmax(0,1fr));
  background: var(--card);
  border-bottom: 1px solid var(--border);
}
.ss-item {
  padding: 8px 10px;
  border-right: 1px solid var(--border);
  text-align: center;
}
.ss-item:last-child { border-right: none; }
.ss-lbl { font-size: 10px; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 3px; }
.ss-val { font-family: var(--font-mono); font-size: 13px; font-weight: 700; }

/* ── ORDER BOOK STRIP ── */
.ob-strip {
  width: 100%; max-width: 520px;
  display: flex; gap: 0;
  background: var(--panel);
  border-bottom: 1px solid var(--border);
  font-family: var(--font-mono); font-size: 11px;
  overflow: hidden;
}
.ob-side { flex: 1; padding: 4px 8px; }
.ob-row  { display: flex; justify-content: space-between; padding: 1px 0; position: relative; }
.ob-bar  { position: absolute; inset: 0; opacity: 0.12; border-radius: 1px; pointer-events: none; }
.ob-sep  { width: 1px; background: var(--border); flex-shrink: 0; }

/* ── TRADE PANEL ── */
.trade-panel {
  width: 100%; max-width: 520px;
  background: var(--panel);
  padding: 12px 14px;
  border-bottom: 1px solid var(--border);
}

/* Event */
.event-bar {
  background: var(--card); border: 1px solid var(--border2);
  border-radius: 6px; padding: 8px 12px;
  font-size: 12px; color: var(--muted2);
  margin-bottom: 10px; min-height: 36px;
  display: flex; align-items: center; gap: 8px;
  transition: border-color 0.3s;
}
.event-bar.alert { border-color: var(--yellow); color: var(--text); }

/* Amount */
.amount-row {
  display: grid; grid-template-columns: repeat(4,1fr); gap: 6px;
  margin-bottom: 10px;
}
.amt-btn {
  font-family: var(--font-mono); font-size: 12px; font-weight: 600;
  padding: 8px; border-radius: 5px;
  background: var(--card); border: 1px solid var(--border);
  color: var(--muted2); cursor: pointer; transition: all 0.15s;
}
.amt-btn.active { background: rgba(22,119,255,0.15); border-color: var(--blue); color: #4096ff; }
.amt-btn:hover:not(.active) { border-color: var(--border2); color: var(--text); }

/* Buy/Sell */
.trade-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
.buy-btn {
  padding: 14px; border: none; border-radius: 6px;
  font-family: var(--font-mono); font-size: 14px; font-weight: 700;
  background: var(--green); color: #011e13;
  cursor: pointer; letter-spacing: 0.08em;
  transition: filter 0.15s, transform 0.1s;
}
.sell-btn {
  padding: 14px; border: none; border-radius: 6px;
  font-family: var(--font-mono); font-size: 14px; font-weight: 700;
  background: var(--red); color: #1a0007;
  cursor: pointer; letter-spacing: 0.08em;
  transition: filter 0.15s, transform 0.1s;
}
.buy-btn:hover  { filter: brightness(1.12); }
.sell-btn:hover { filter: brightness(1.12); }
.buy-btn:active, .sell-btn:active { transform: scale(0.98); }

/* Cost preview */
.cost-preview {
  display: flex; justify-content: space-between;
  font-family: var(--font-mono); font-size: 11px;
  color: var(--muted); padding: 0 2px;
  margin-bottom: 10px;
}

/* Trade history */
.hist-head {
  font-size: 10px; font-weight: 700; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--muted); margin-bottom: 6px;
  display: flex; justify-content: space-between;
}
.hist-cols {
  display: grid; grid-template-columns: 60px 1fr 80px 60px;
  font-family: var(--font-mono); font-size: 10px; color: var(--muted);
  padding: 0 2px 4px; border-bottom: 1px solid var(--border);
  margin-bottom: 4px;
}
.trade-item {
  display: grid; grid-template-columns: 60px 1fr 80px 60px;
  font-family: var(--font-mono); font-size: 11px;
  padding: 5px 2px; border-bottom: 1px solid var(--border);
}
.trade-item:last-child { border-bottom: none; }

/* ── MODAL ── */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(7,10,20,0.94);
  z-index: 200; display: none;
  overflow-y: auto; padding: 14px;
}
.modal-overlay.open { display: block; }
.modal {
  max-width: 500px; margin: 0 auto;
  background: var(--panel); border: 1px solid var(--border2);
  border-radius: 12px; padding: 18px;
}
.modal-hdr {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 14px;
}
.modal-title {
  font-family: var(--font-mono); font-size: 14px; font-weight: 700;
  color: var(--yellow); letter-spacing: 0.08em;
}
.modal-close {
  width: 28px; height: 28px; border-radius: 5px;
  background: var(--card); border: 1px solid var(--border);
  font-size: 16px; cursor: pointer; color: var(--muted2);
  display: flex; align-items: center; justify-content: center;
}
.modal-close:hover { background: rgba(246,70,93,0.15); border-color: var(--red); color: var(--red); }

.prog-row {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 8px; padding: 10px 14px;
  display: flex; align-items: center; gap: 12px; margin-bottom: 14px;
}
.prog-info { flex: 1; }
.prog-lbl  { font-size: 10px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 5px; }
.prog-track { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
.prog-fill  { height: 100%; background: linear-gradient(90deg,var(--blue),var(--yellow)); border-radius: 2px; transition: width 0.5s; width: 0%; }
.prog-num   { font-family: var(--font-mono); font-size: 1.2rem; font-weight: 700; color: var(--yellow); white-space: nowrap; }
.prog-num small { font-size: 0.7rem; color: var(--muted); }

.cat { margin-bottom: 16px; }
.cat-hdr {
  display: flex; align-items: center; gap: 6px;
  padding-bottom: 7px; margin-bottom: 8px;
  border-bottom: 1px solid var(--border);
}
.cat-name { font-family: var(--font-mono); font-size: 10px; font-weight: 700; letter-spacing: 0.14em; }
.cat-cnt  { margin-left: auto; font-family: var(--font-mono); font-size: 10px; color: var(--muted); }

.ach-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(130px,1fr)); gap: 7px; }
.ach {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 7px; padding: 10px 9px;
  position: relative; overflow: hidden;
  transition: transform 0.2s, border-color 0.25s, box-shadow 0.25s;
}
.ach.locked  { opacity: 0.32; filter: grayscale(0.8); }
.ach.unlocked { opacity: 1; filter: none; }
.ach.unlocked:hover {
  transform: translateY(-1px);
  border-color: var(--gc, var(--border2));
  box-shadow: 0 0 14px var(--gc, transparent);
}
@keyframes achPop {
  0%   { transform:scale(1); box-shadow:0 0 0 var(--gc,#fff); }
  40%  { transform:scale(1.05); box-shadow:0 0 28px var(--gc,#fff); }
  100% { transform:scale(1); box-shadow:0 0 8px var(--gc,#fff); }
}
.ach.just-unlocked { animation: achPop 0.65s ease; }
.ach-em  { font-size: 20px; margin-bottom: 6px; display: block; }
.ach-nm  { font-size: 11px; font-weight: 700; margin-bottom: 2px; }
.ach-ds  { font-size: 9px; color: var(--muted); line-height: 1.4; }
.ach-chk {
  position: absolute; top: 6px; right: 6px;
  width: 14px; height: 14px; border-radius: 50%;
  background: var(--green); display: none;
  align-items: center; justify-content: center;
  font-size: 8px; color: #011e13; font-weight: 700;
}
.ach.unlocked .ach-chk { display: flex; }
.ach-lck { position: absolute; bottom: 6px; right: 6px; font-size: 10px; opacity: 0.3; }
.ach.unlocked .ach-lck { display: none; }

.legacy-card {
  background: linear-gradient(135deg,#0d111f,#180f28);
  border: 1px solid #3d1a6e; border-radius: 10px;
  padding: 16px; display: flex; align-items: center; gap: 14px;
  margin-top: 6px; position: relative; overflow: hidden;
  transition: transform 0.2s, box-shadow 0.2s;
}
.legacy-card::before {
  content:''; position:absolute; inset:0;
  background: radial-gradient(ellipse at center, rgba(168,85,247,0.08), transparent 65%);
  pointer-events: none;
}
.legacy-card.locked { opacity: 0.38; }
.legacy-card.unlocked:hover { transform:translateY(-1px); box-shadow:0 0 30px rgba(168,85,247,0.2); }
.leg-icon {
  width: 52px; height: 52px; border-radius: 12px; flex-shrink: 0;
  background: rgba(168,85,247,0.1); border: 1px solid rgba(168,85,247,0.25);
  display: flex; align-items: center; justify-content: center; font-size: 26px;
}
@keyframes legPulse { 0%,100%{box-shadow:0 0 0 rgba(168,85,247,0.3)} 50%{box-shadow:0 0 24px rgba(168,85,247,0.4)} }
.legacy-card.unlocked .leg-icon { animation: legPulse 2s infinite; }
.leg-nm {
  font-family: var(--font-mono); font-size: 13px; font-weight: 700;
  background: linear-gradient(90deg,#a855f7,#f59e0b);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  margin-bottom: 3px;
}
.leg-ds { font-size: 11px; color: var(--muted2); }
.leg-chk {
  width: 24px; height: 24px; border-radius: 50%; background: var(--green);
  display: none; align-items: center; justify-content: center;
  font-size: 12px; margin-left: auto; flex-shrink: 0;
}
.legacy-card.unlocked .leg-chk { display: flex; }
.leg-lck { font-size: 18px; opacity: 0.22; margin-left: auto; flex-shrink: 0; }
.legacy-card.unlocked .leg-lck { display: none; }

/* ── TOAST ── */
#toast {
  position: fixed; bottom: 18px; left: 50%;
  transform: translateX(-50%) translateY(70px);
  background: var(--card); border: 1px solid var(--green);
  border-radius: 6px; padding: 10px 16px;
  display: flex; align-items: center; gap: 8px;
  font-family: var(--font-mono); font-size: 12px; font-weight: 600;
  color: var(--green);
  transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
  z-index: 300; box-shadow: 0 0 20px rgba(14,203,129,0.15);
  pointer-events: none; white-space: nowrap;
}
#toast.show { transform: translateX(-50%) translateY(0); }

/* scrollbar */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: var(--panel); }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="tb-symbol">
    <div class="tb-dot"></div>
    CRP/USDT
  </div>
  <div class="tb-price" id="tbPrice">$50.00</div>
  <div class="tb-change up" id="tbChange">+0.00%</div>
  <div class="tb-right">
    <div class="rank-badge" id="rank">BRONZE</div>
    <div class="icon-btn" id="achBtn" title="Achievements">
      🏆<div class="ach-dot" id="achDot"></div>
    </div>
    <button class="pause-btn" id="pauseBtn">⏸ Pause</button>
  </div>
</div>

<!-- TICKER -->
<div class="ticker-row" id="tickerRow">
  <div class="ticker-item"><div class="ti-name">Balans</div><div class="ti-val" id="tkBal">$100.00</div></div>
  <div class="ticker-item"><div class="ti-name">Coinlar</div><div class="ti-val" id="tkCoins">0</div></div>

</div>

<!-- CHART -->
<div class="chart-section">
  <div class="chart-controls">
    <button class="tf-btn active">1m</button>
    <button class="tf-btn">5m</button>
    <button class="tf-btn">15m</button>
    <button class="tf-btn">1h</button>

  <div class="candle-wrap">
    <canvas id="candleCanvas"></canvas>
    <div class="price-label" id="priceLabel"></div>
  </div>
  <div class="vol-wrap">
    <canvas id="volCanvas"></canvas>
  </div>
</div>

<!-- ORDER BOOK STRIP -->
<div class="ob-strip" id="obStrip">
  <div class="ob-side" id="obAsks"></div>
  <div class="ob-sep"></div>
  <div class="ob-side" id="obBids"></div>
</div>

<!-- STATS STRIP -->
<div class="stats-strip">
  <div class="ss-item"><div class="ss-lbl">Balans</div><div class="ss-val" id="ssBal">$100.00</div></div>
  <div class="ss-item"><div class="ss-lbl">Coins</div><div class="ss-val" id="ssCoins">0</div></div>
  <div class="ss-item"><div class="ss-lbl">Worth</div><div class="ss-val" id="ssTotal">$100.00</div></div>
  <div class="ss-item"><div class="ss-lbl">P&L %</div><div class="ss-val" id="ssPnl" style="color:var(--green)">+0%</div></div>
</div>

<!-- TRADE PANEL -->
<div class="trade-panel">
  <div class="event-bar" id="evtBar">📡 Bozorga xush kelibsiz!</div>

  <div class="amount-row">
    <button class="amt-btn active" data-a="1">×1</button>
    <button class="amt-btn" data-a="10">×10</button>
    <button class="amt-btn" data-a="50">×50</button>
    <button class="amt-btn" data-a="max">MAX</button>
  </div>

  <div class="cost-preview">
    <span>Narx: <span id="cpPrice" style="color:var(--text)">$50.00</span></span>
    <span>Xarajat: <span id="cpCost" style="color:var(--yellow)">$50.00</span></span>
    <span>Keyin: <span id="cpAfter" style="color:var(--muted2)">$50.00</span></span>
  </div>

  <div class="trade-row">
    <button class="buy-btn" onclick="buy()">BUY / LONG</button>
    <button class="sell-btn" onclick="sell()">SELL / SHORT</button>
  </div>

  <div class="hist-cols">
    <span>Vaqt</span><span>Tur</span><span>Narx</span><span>Miqdor</span>
  </div>
  <div id="histList"></div>
</div>

<!-- ACHIEVEMENTS MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-hdr">
      <div class="modal-title">🏆 ACHIEVEMENTS</div>
      <button class="modal-close" id="modalClose">✕</button>
    </div>
    <div class="prog-row">
      <div class="prog-info">
        <div class="prog-lbl">Umumiy progress</div>
        <div class="prog-track"><div class="prog-fill" id="progFill"></div></div>
      </div>
      <div class="prog-num" id="progNum">0 <small>/ 25</small></div>
    </div>
    <div id="achCats"></div>
  </div>
</div>

<div id="toast"><span id="tIcon">🏆</span>&nbsp;<span id="tMsg">Achievement!</span></div>

<script>
// ══════════════════════════════════════
// ACHIEVEMENTS
// ══════════════════════════════════════
const CATS = [
  { id:'b', name:"BOSHLANG'ICH", icon:'🟢', col:'#0ecb81', achs:[

function newCandle(price) {
  return { o:price, h:price, l:price, c:price, v:0 };

  for(let i=0;i<30;i++){
    const o=p, change=p*(Math.random()*0.08-0.04);

    const h=Math.max(o,p)*(1+Math.random()*0.015);
    const l=Math.min(o,p)*(1-Math.random()*0.015);
    candles.push({o,h,l:Math.max(0.5,l),c:p,v:Math.random()*500+100});
    linePoints.push(p);
  }
  currentPrice=p;
  currentCandle=newCandle(p);
  dayHigh=Math.max(...candles.map(c=>c.h));

function drawChart(){
  const W=cc.width, H=cc.height;
  cctx.clearRect(0,0,W,H);

  const allCandles=[...candles, currentCandle];
  const visible=allCandles.slice(-MAX_CANDLES);
  const n=visible.length;
  if(!n) return;

  const prices=visible.flatMap(c=>[c.h,c.l]);
  const maxP=Math.max(...prices), minP=Math.min(...prices);
  const range=maxP-minP||1;
  const PAD_T=16, PAD_B=20, PAD_R=54;
  const chartH=H-PAD_T-PAD_B;
  const chartW=W-PAD_R;

  const toY=p=>PAD_T+((maxP-p)/range)*chartH;
  const slotW=chartW/n;

  // Grid lines
  cctx.strokeStyle='rgba(31,42,61,0.8)';
  cctx.lineWidth=0.5;
  for(let i=0;i<=4;i++){
    const y=PAD_T+i*(chartH/4);
    cctx.beginPath(); cctx.moveTo(0,y); cctx.lineTo(chartW,y); cctx.stroke();
    const lbl=(maxP-(i/4)*range).toFixed(2);
    cctx.fillStyle='#5e6673'; cctx.font='9px JetBrains Mono';
    cctx.fillText(lbl,chartW+4,y+3);
  }

  if(chartMode==='candle'){
    visible.forEach((cd,i)=>{
      const x=i*slotW, mid=x+slotW/2;
      const cw=Math.max(slotW*CANDLE_W_RATIO,1);
      const isUp=cd.c>=cd.o;
      const col=isUp?'#0ecb81':'#f6465d';

      // Wick
      cctx.strokeStyle=col; cctx.lineWidth=1;
      cctx.beginPath();
      cctx.moveTo(mid,toY(cd.h));
      cctx.lineTo(mid,toY(cd.l));
      cctx.stroke();

      // Body
      const bodyTop=toY(Math.max(cd.o,cd.c));
      const bodyBot=toY(Math.min(cd.o,cd.c));
      const bodyH=Math.max(bodyBot-bodyTop,1);
      cctx.fillStyle=col;
      cctx.fillRect(mid-cw/2, bodyTop, cw, bodyH);
    });
  } else {
    // Line chart
    cctx.strokeStyle='#1677ff'; cctx.lineWidth=1.5;
    cctx.beginPath();
    visible.forEach((cd,i)=>{
      const x=i*slotW+slotW/2, y=toY(cd.c);
      i===0?cctx.moveTo(x,y):cctx.lineTo(x,y);
    });
    cctx.stroke();
    // Fill
    const grad=cctx.createLinearGradient(0,PAD_T,0,H);
    grad.addColorStop(0,'rgba(22,119,255,0.18)');
    grad.addColorStop(1,'rgba(22,119,255,0)');
    cctx.fillStyle=grad;
    cctx.beginPath();
    visible.forEach((cd,i)=>{
      const x=i*slotW+slotW/2, y=toY(cd.c);
      i===0?cctx.moveTo(x,y):cctx.lineTo(x,y);
    });
    cctx.lineTo((n-1)*slotW+slotW/2,H);
    cctx.lineTo(0,H); cctx.closePath(); cctx.fill();
  }

  // Current price line
  const cy=toY(currentPrice);
  cctx.strokeStyle='rgba(240,185,11,0.6)'; cctx.lineWidth=0.8;
  cctx.setLineDash([4,3]);
  cctx.beginPath(); cctx.moveTo(0,cy); cctx.lineTo(chartW,cy); cctx.stroke();
  cctx.setLineDash([]);
  // Price tag right
  cctx.fillStyle='#f0b90b';
  cctx.fillRect(chartW,cy-8,W-chartW,16);
  cctx.fillStyle='#0b0e17'; cctx.font='bold 9px JetBrains Mono';
  cctx.fillText('$'+currentPrice.toFixed(2),chartW+2,cy+3);

  // Support lines (green dashed)
  supports.forEach(s=>{
    if(s<minP-range*0.1||s>maxP+range*0.1) return;
    const sy=toY(s);
    cctx.strokeStyle='rgba(14,203,129,0.4)'; cctx.lineWidth=0.7;
    cctx.setLineDash([3,5]);
    cctx.beginPath(); cctx.moveTo(0,sy); cctx.lineTo(chartW,sy); cctx.stroke();
    cctx.setLineDash([]);
    cctx.fillStyle='rgba(14,203,129,0.8)'; cctx.font='8px JetBrains Mono';
    cctx.fillText('S $'+s.toFixed(1),3,sy-2);
  });

  // Resistance lines (red dashed)
  resistances.forEach(r=>{
    if(r<minP-range*0.1||r>maxP+range*0.1) return;
    const ry=toY(r);
    cctx.strokeStyle='rgba(246,70,93,0.4)'; cctx.lineWidth=0.7;
    cctx.setLineDash([3,5]);
    cctx.beginPath(); cctx.moveTo(0,ry); cctx.lineTo(chartW,ry); cctx.stroke();
    cctx.setLineDash([]);
    cctx.fillStyle='rgba(246,70,93,0.8)'; cctx.font='8px JetBrains Mono';
    cctx.fillText('R $'+r.toFixed(1),3,ry-2);
  });

  // Phase + RSI badge (top-left corner)
  const phaseCol={accumulation:'#1677ff',markup:'#0ecb81',distribution:'#f0b90b',markdown:'#f6465d'}[phase]||'#848e9c';
  const badge='▸ '+phase.toUpperCase()+' | RSI '+Math.round(rsi);
  cctx.fillStyle='rgba(11,14,23,0.78)';
  cctx.fillRect(3,2,badge.length*5.8+4,13);
  cctx.fillStyle=phaseCol; cctx.font='bold 9px JetBrains Mono';
  cctx.fillText(badge,5,12);

  drawVolume();
}

function drawVolume(){
  const W=vc.width, H=vc.height;
  vctx.clearRect(0,0,W,H);
  const allCandles=[...candles,currentCandle];
  const visible=allCandles.slice(-MAX_CANDLES);
  const n=visible.length; if(!n) return;
  const PAD_R=54;
  const chartW=W-PAD_R;
  const slotW=chartW/n;
  const maxV=Math.max(...visible.map(c=>c.v))||1;

  visible.forEach((cd,i)=>{
    const x=i*slotW, mid=x+slotW/2;
    const cw=Math.max(slotW*CANDLE_W_RATIO,1);
    const isUp=cd.c>=cd.o;
    const barH=(cd.v/maxV)*(H-2);
    vctx.fillStyle=isUp?'rgba(14,203,129,0.45)':'rgba(246,70,93,0.45)';
    vctx.fillRect(mid-cw/2, H-barH, cw, barH);
  });
}

// ══════════════════════════════════════
// REALISTIC MARKET ENGINE
// Trend phases, momentum, RSI-like pressure,
// support/resistance, volume bursts, mean reversion
// ══════════════════════════════════════

// ── Market state ──
const PHASES = ['accumulation','markup','distribution','markdown'];
let phase      = 'accumulation'; // current market phase
let phaseTicks = 0;              // ticks spent in current phase
let phaseLen   = randInt(40,120);// how long this phase lasts

let trend      = 0;              // directional bias  -1..+1
let momentum   = 0;              // speed of trend    -0.03..+0.03
let volatility = 0.012;          // base vol, breathes up/down

// Support / resistance levels (updated dynamically)
let supports    = [30, 42, 48];
let resistances = [55, 62, 78];

// RSI-like overbought/oversold pressure (0..100)
let rsi = 50;

// Volume multiplier (spikes on breakouts/events)
let volMult = 1;

function randInt(a,b){ return Math.floor(Math.random()*(b-a+1))+a; }
function clamp(v,lo,hi){ return Math.max(lo,Math.min(hi,v)); }

// EMA helper (applied to price array)
function ema(arr, period){
  const k=2/(period+1); let e=arr[0];
  for(let i=1;i<arr.length;i++) e=arr[i]*k+e*(1-k);
  return e;
}

// Advance market phase
function advancePhase(){
  const idx=(PHASES.indexOf(phase)+1)%PHASES.length;
  phase=PHASES[idx];
  phaseTicks=0;
  phaseLen=randInt(35,130);

  // Set trend bias per phase
  if(phase==='accumulation'){ trend=clamp(trend+0.1,-0.3,0.15); volatility=0.008; }
  if(phase==='markup')      { trend=clamp(0.25+Math.random()*0.2,0,0.5);  volatility=0.015; }
  if(phase==='distribution'){ trend=clamp(trend-0.05,-0.1,0.1); volatility=0.018; }
  if(phase==='markdown')    { trend=clamp(-0.25-Math.random()*0.2,-0.5,0); volatility=0.02; }

  showPhaseMsg();
}

function showPhaseMsg(){
  const msgs={
    accumulation:['📦 Smart money yig\'moqda... Konsolidatsiya.','🔍 Balansda o\'yin: qaysi taraf g\'alaba qozonadi?'],
    markup:       ['📈 Breakout! Momentum kuchaymoqda!','🟢 Bulls nazoratda — trend yuqoriga!'],
    distribution: ['⚠️ Kitlar pozitsiyalarini yopmoqda...','📊 Hajm pasaymoqda — diqqatli bo\'l!'],
    markdown:     ['📉 Bears bosim o\'tkazmoqda!','🔴 Support sinib tushdi — panic boshlandi!'],
  };
  const list=msgs[phase];
  const msg=list[randInt(0,list.length-1)];
  const eb=document.getElementById('evtBar');
  eb.textContent=msg; eb.classList.add('alert');
  setTimeout(()=>eb.classList.remove('alert'),3000);
}

// Dynamic support/resistance: update based on recent price action
function updateSR(){
  const closes=candles.slice(-20).map(c=>c.c);
  if(closes.length<5) return;
  // simple: local lows → support, local highs → resistance
  const mn=Math.min(...closes), mx=Math.max(...closes);
  // keep 3 supports below current, 3 resistances above
  supports=[mn*0.94, mn*0.97, mn].map(v=>parseFloat(v.toFixed(2)));
  resistances=[mx, mx*1.03, mx*1.07].map(v=>parseFloat(v.toFixed(2)));
}

// News events
const EVENTS=[
  {msg:'🚀 Elon Musk tvit qildi! Pump!',    impact:+0.09, crash:false},
  {msg:'💥 Regulyator bosimi! Dump!',        impact:-0.11, crash:true },
  {msg:'🔥 Katta hamkorlik! Bozor yashil!', impact:+0.08, crash:false},
  {msg:'🐳 Kitlar sotishni boshladi!',       impact:-0.07, crash:true },
  {msg:'💣 SEC tekshiruvi!',                 impact:-0.13, crash:true },
  {msg:'⚡ Institutional xarid! Pump!',     impact:+0.12, crash:false},
  {msg:'☠️ Exchange hack! Panic sell!',      impact:-0.15, crash:true },
  {msg:'🌕 Halving! Moon!',                  impact:+0.14, crash:false},
  {msg:'📰 Bullish news cycle devomi!',      impact:+0.06, crash:false},
  {msg:'😱 FUD tarqaldi! Sell-off!',         impact:-0.09, crash:true },
];

let tickCount=0;
setInterval(()=>{
  if(isPaused) return;
  tickCount++;
  phaseTicks++;
  activeEvent=false;

  // ── 1. Advance phase if expired ──
  if(phaseTicks>=phaseLen) advancePhase();

  // ── 2. RSI pressure (mean reversion) ──
  // Prices too high → selling pressure; too low → buying pressure
  const recentCloses=candles.slice(-14).map(c=>c.c);
  if(recentCloses.length>=2){
    let gains=0,losses=0;
    for(let i=1;i<recentCloses.length;i++){
      const d=recentCloses[i]-recentCloses[i-1];
      if(d>0) gains+=d; else losses+=Math.abs(d);
    }
    const rs=losses===0?100:gains/losses;
    rsi=clamp(100-(100/(1+rs)),0,100);
  }
  const rsiBias=(50-rsi)/50*0.015;  // overbought → sell pressure, oversold → buy pressure

  // ── 3. Momentum decay ──
  momentum=clamp(momentum*0.88 + trend*0.012, -0.04, 0.04);

  // ── 4. Support / resistance bounce ──
  let srBounce=0;
  const nearSup=supports.find(s=>currentPrice<s*1.02&&currentPrice>s*0.97);
  const nearRes=resistances.find(r=>currentPrice>r*0.98&&currentPrice<r*1.03);
  if(nearSup && trend<0){ srBounce=+0.008*(Math.random()+0.5); volMult=1.6; } // bounce from support
  if(nearRes && trend>0){ srBounce=-0.008*(Math.random()+0.5); volMult=1.6; } // rejection at resistance
  else { volMult=Math.max(1, volMult*0.9); }

  // ── 5. Volatility breathing (higher vol in distribution/markdown) ──
  const volNoise=(Math.random()-0.5)*0.003;
  volatility=clamp(volatility+volNoise, 0.006, 0.035);

  // ── 6. Base random noise ──
  const noise=(Math.random()-0.5)*volatility*2;

  // ── 7. Compose final change ──
  let change=currentPrice*(momentum + rsiBias + srBounce + noise);

  // ── 8. News event (rare, big impact) ──
  if(Math.random()>0.93){
    const ev=EVENTS[randInt(0,EVENTS.length-1)];
    // news impact is modulated by phase (bull news stronger in markup etc.)
    let strength=ev.impact;
    if(phase==='markup'   &&ev.impact>0) strength*=1.3;
    if(phase==='markdown' &&ev.impact<0) strength*=1.3;
    change+=currentPrice*strength;
    volMult=2.5;
    const eb=document.getElementById('evtBar');
    eb.textContent=ev.msg; eb.classList.add('alert');
    setTimeout(()=>eb.classList.remove('alert'),3000);
    activeEvent=true;
    boughtDuringEvent=false;
    if(ev.crash){
      crashCount++;
      if(crashCount>=3) tryUnlock('survivor');
    }
    // news can shift trend
    trend=clamp(trend+ev.impact*0.5,-0.5,0.5);
  }

  // ── 9. Apply ──
  currentPrice=Math.max(0.5, currentPrice+change);
  if(currentPrice>dayHigh) dayHigh=currentPrice;
  if(currentPrice<dayLow)  dayLow=currentPrice;

  // ── 10. Update SR every 20 ticks ──
  if(tickCount%20===0) updateSR();

  // Update current candle
  if(!currentCandle) currentCandle=newCandle(currentPrice);
  currentCandle.c=currentPrice;
  currentCandle.h=Math.max(currentCandle.h,currentPrice);
  currentCandle.l=Math.min(currentCandle.l,currentPrice);
  currentCandle.v+=(Math.abs(change/currentPrice)*volMult*800)+Math.random()*20;

  // Close candle every 8 ticks
  if(tickCount%8===0){
    candles.push({...currentCandle});
    if(candles.length>MAX_CANDLES) candles.shift();
    currentCandle=newCandle(currentPrice);
  }

  // Silent
  if(Date.now()-lastActionTime>=60000) tryUnlock('silent_player');
  // Diamond hands
  if(holdingStart&&coins>0&&Date.now()-holdingStart>=300000) tryUnlock('diamond_hands');
  // Night trader
  const h=new Date().getHours();
  if((h>=22||h<6)&&totalWorth()>110) tryUnlock('night_trader');

  updateUI();
  drawChart();
  updateOrderBook();
},700);

// ══════════════════════════════════════
// GAME LOGIC
// ══════════════════════════════════════
function totalWorth(){ return balance+coins*currentPrice; }

function updateUI(){
  const total=totalWorth();
  const profit=total-100;
  const pct=((profit/100)*100).toFixed(1);
  const startPrice=50;
  const dayChg=((currentPrice-startPrice)/startPrice*100).toFixed(2);
  const isUp=profit>=0;
  const dayUp=parseFloat(dayChg)>=0;

  document.getElementById('tbPrice').textContent='$'+currentPrice.toFixed(2);
  document.getElementById('tbPrice').style.color=change=>currentCandle&&currentCandle.c>=currentCandle.o?'var(--green)':'var(--red)';

  const chEl=document.getElementById('tbChange');
  chEl.textContent=(dayUp?'+':'')+dayChg+'%';
  chEl.className='tb-change '+(dayUp?'up':'down');

  document.getElementById('tkBal').textContent='$'+balance.toFixed(2);
  document.getElementById('tkCoins').textContent=coins;
  document.getElementById('tkTotal').textContent='$'+total.toFixed(2);
  const pnlEl=document.getElementById('tkPnl');
  pnlEl.textContent=(profit>=0?'+':'')+profit.toFixed(2)+'$';
  pnlEl.className='ti-val '+(isUp?'up':'down');
  document.getElementById('tkHigh').textContent='$'+dayHigh.toFixed(2);
  document.getElementById('tkLow').textContent='$'+dayLow.toFixed(2);

  document.getElementById('ssBal').textContent='$'+balance.toFixed(2);
  document.getElementById('ssCoins').textContent=coins;
  document.getElementById('ssTotal').textContent='$'+total.toFixed(2);
  const pEl=document.getElementById('ssPnl');
  pEl.textContent=(profit>=0?'+':'')+pct+'%';
  pEl.style.color=isUp?'var(--green)':'var(--red)';

  let rank='BRONZE';
  if(total>=10000)rank='LEGENDARY 👑';
  else if(total>=5000)rank='DIAMOND 💎';
  else if(total>=2000)rank='GOLD 🏆';
  else if(total>=500)rank='SILVER';
  document.getElementById('rank').textContent=rank;

  // Cost preview
  const amt=getAmt('buy');
  document.getElementById('cpPrice').textContent='$'+currentPrice.toFixed(2);
  document.getElementById('cpCost').textContent='$'+(currentPrice*amt).toFixed(2);
  document.getElementById('cpAfter').textContent='$'+(balance-currentPrice*amt).toFixed(2);

  checkAchs();
}

function buy(){
  if(isPaused) return;
  const amt=getAmt('buy');
  if(amt<=0||balance<currentPrice*amt){ flash('Balans yetarli emas!'); return; }
  lastBuyPrice=currentPrice;
  balance-=currentPrice*amt;
  coins+=amt; totalTrades++;
  holdingStart=Date.now();
  boughtDuringEvent=activeEvent;
  speedTrades.push(Date.now());
  speedTrades=speedTrades.filter(t=>Date.now()-t<=10000);
  if(speedTrades.length>=5) tryUnlock('speed_trader');
  lastActionTime=Date.now();
  addHist('BUY',amt);
  flash('Sotib olindi: '+amt+' × $'+currentPrice.toFixed(2));
  updateUI();
  saveGame();
}

function sell(){
  if(isPaused) return;
  const amt=getAmt('sell');
  if(amt<=0||coins<amt){ flash("Yetarli coin yo'q!"); return; }
  const profit=(currentPrice-lastBuyPrice)*amt;
  if(profit>0){ consecutiveProfit++; if(consecutiveProfit>=3) tryUnlock('market_reader'); }
  else { consecutiveProfit=0; }
  if(profit>20) tryUnlock('lucky_guy');
  if(boughtDuringEvent&&profit>0){ eventProfit+=profit; tryUnlock('chaos_master'); }
  balance+=currentPrice*amt;
  coins-=amt; totalTrades++;
  speedTrades.push(Date.now());
  speedTrades=speedTrades.filter(t=>Date.now()-t<=10000);
  if(speedTrades.length>=5) tryUnlock('speed_trader');
  lastActionTime=Date.now();
  addHist('SELL',amt);
  flash('Sotildi: '+amt+' × $'+currentPrice.toFixed(2)+' | PnL: '+(profit>=0?'+':'')+profit.toFixed(2)+'$');
  updateUI();
  saveGame();
}

function getAmt(side){
  const v=document.querySelector('.amt-btn.active')?.dataset.a||'1';
  if(v==='max') return side==='sell'?coins:Math.floor(balance/currentPrice);
  return parseInt(v)||0;
}

function flash(msg){
  const eb=document.getElementById('evtBar');
  eb.textContent=msg; eb.classList.add('alert');
  setTimeout(()=>eb.classList.remove('alert'),1500);
}

function addHist(action,amt){
  tradeHistory.unshift({action,amt,price:currentPrice.toFixed(2),
    time:new Date().toLocaleTimeString('uz-UZ',{hour:'2-digit',minute:'2-digit'})});
  if(tradeHistory.length>6) tradeHistory.pop();
  document.getElementById('histList').innerHTML=tradeHistory.map(t=>{
    const isB=t.action==='BUY';
    return `<div class="trade-item">
      <span style="color:var(--muted)">${t.time}</span>
      <span style="color:${isB?'var(--green)':'var(--red)'};font-weight:700">${t.action}</span>
      <span style="color:var(--text)">$${t.price}</span>
      <span style="color:var(--muted2)">×${t.amt}</span>
    </div>`;
  }).join('');
}

// ══════════════════════════════════════
// ACH CHECKS
// ══════════════════════════════════════
function checkAchs(){
  const total=totalWorth(), profit=total-100;
  if(totalTrades>=1) tryUnlock('first_step');
  if(profit>0) tryUnlock('first_profit');
  if(profit>10) tryUnlock('small_win');
  if(totalTrades>=5) tryUnlock('trader_born');
  if(totalTrades>=20) tryUnlock('getting_serious');
  if(total>=200) tryUnlock('rich_start');
  if(total>=500) tryUnlock('money_maker');
  if(total>=1000) tryUnlock('big_player');
  if(total>=5000) tryUnlock('whale_mode');
  if(total>=10000) tryUnlock('legend_wallet');
  if(coins>=50) tryUnlock('collector');
  if(coins>=200) tryUnlock('hoarder');
  if(coins>=999) tryUnlock('coin_king');
  if(balance<100&&total>100) tryUnlock('risk_taker');
  if(wasInLoss&&profit>0) tryUnlock('comeback');
  if(profit<0) wasInLoss=true;
  if(balance<=10&&coins>0) tryUnlock('last_chance');
  if(ALL_IDS.every(id=>unlocked.has(id))) tryUnlock('criperman_legacy');
}

// ══════════════════════════════════════
// UNLOCK
// ══════════════════════════════════════
let toastT;
function tryUnlock(id){
  if(unlocked.has(id)) return;
  unlocked.add(id);
  localStorage.setItem('crc_ach',JSON.stringify([...unlocked]));
  const card=document.querySelector(`[data-id="${id}"]`);
  if(card){
    card.classList.remove('locked'); card.classList.add('unlocked','just-unlocked');
    const a=findAch(id); if(a) card.style.setProperty('--gc',a.gc);
    setTimeout(()=>card.classList.remove('just-unlocked'),800);
  }
  const a=findAch(id)||LEGACY;
  const t=document.getElementById('toast');
  document.getElementById('tIcon').textContent=a.em;
  document.getElementById('tMsg').textContent='Unlocked: '+a.nm;
  t.classList.add('show');
  clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('show'),3000);
  updateProgress();
  if(!document.getElementById('modalOverlay').classList.contains('open'))
    document.getElementById('achDot').classList.add('on');
}

function findAch(id){
  for(const c of CATS){ const a=c.achs.find(x=>x.id===id); if(a) return a; }
  return LEGACY.id===id?LEGACY:null;
}

// ══════════════════════════════════════
// MODAL
// ══════════════════════════════════════
function renderModal(){
  let html='';
  CATS.forEach(cat=>{
    html+=`<div class="cat">
      <div class="cat-hdr" style="border-bottom-color:${cat.col}33">
        <span>${cat.icon}</span>
        <span class="cat-name" style="color:${cat.col}">${cat.name}</span>
        <span class="cat-cnt" id="cc-${cat.id}">${cat.achs.filter(a=>unlocked.has(a.id)).length}/${cat.achs.length}</span>
      </div>
      <div class="ach-grid">`;
    cat.achs.forEach(a=>{
      const u=unlocked.has(a.id);
      html+=`<div class="ach ${u?'unlocked':'locked'}" data-id="${a.id}" ${u?`style="--gc:${a.gc}"`:''}">
        <span class="ach-em">${a.em}</span>
        <div class="ach-nm">${a.nm}</div>
        <div class="ach-ds">${a.ds}</div>
        <div class="ach-chk">✓</div>
        <div class="ach-lck">🔒</div>
      </div>`;
    });
    html+='</div></div>';
  });
  const isL=unlocked.has(LEGACY.id);
  html+=`<div class="legacy-card ${isL?'unlocked':'locked'}" data-id="${LEGACY.id}">
    <div class="leg-icon">${LEGACY.em}</div>
    <div><div class="leg-nm">${LEGACY.nm}</div><div class="leg-ds">${LEGACY.ds}</div></div>
    <div class="leg-chk">✓</div>
    <div class="leg-lck">🔒</div>
  </div>`;
  document.getElementById('achCats').innerHTML=html;
  updateProgress();
}

function updateProgress(){
  const done=[...unlocked].filter(id=>ALL_IDS.includes(id)||(id===LEGACY.id)).length;
  document.getElementById('progNum').innerHTML=done+' <small>/ '+TOTAL+'</small>';
  document.getElementById('progFill').style.width=(done/TOTAL*100)+'%';
  CATS.forEach(cat=>{
    const el=document.getElementById('cc-'+cat.id);
    if(el) el.textContent=cat.achs.filter(a=>unlocked.has(a.id)).length+'/'+cat.achs.length;
  });
}

// ══════════════════════════════════════
// CONTROLS
// ══════════════════════════════════════
document.querySelectorAll('.amt-btn').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('.amt-btn').forEach(x=>x.classList.remove('active'));
  b.classList.add('active'); updateUI();
}));

document.getElementById('pauseBtn').addEventListener('click',()=>{
  isPaused=!isPaused;
  document.getElementById('pauseBtn').textContent=isPaused?'▶ Resume':'⏸ Pause';
  flash(isPaused?"Bozor to'xtatildi.":'Bozor yana ishlamoqda.');
  saveGame();
});

document.getElementById('achBtn').addEventListener('click',()=>{
  document.getElementById('modalOverlay').classList.add('open');
  document.getElementById('achDot').classList.remove('on');
  renderModal();
});
document.getElementById('modalClose').addEventListener('click',()=>
  document.getElementById('modalOverlay').classList.remove('open'));
document.getElementById('modalOverlay').addEventListener('click',e=>{
  if(e.target===document.getElementById('modalOverlay'))
    document.getElementById('modalOverlay').classList.remove('open');
});

document.querySelectorAll('.tf-btn').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('.tf-btn').forEach(x=>x.classList.remove('active'));
  b.classList.add('active');
}));

// ══════════════════════════════════════
// SAVE/LOAD SYSTEM
// ══════════════════════════════════════
const STORAGE_KEY = 'cripcoin_save';

function saveGame() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      balance,
      coins,
      currentPrice,
      isPaused,
      tradeHistory,
      totalTrades,
      consecutiveProfit,
      crashCount,
      wasInLoss,
      holdingStart,
      lastActionTime,
      speedTrades,
      boughtDuringEvent,
      eventProfit,
      activeEvent,
      lastBuyPrice,
      dayHigh,
      dayLow,
      candles,
      currentCandle,
      chartMode,
      linePoints
    }));
    localStorage.setItem('crc_ach', JSON.stringify([...unlocked]));
  } catch (e) {
    console.warn('Save failed:', e);
  }
}

function loadGame() {
  try {
    const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null');
    if (saved) {
      balance = saved.balance ?? balance;
      coins = saved.coins ?? coins;
      currentPrice = saved.currentPrice ?? currentPrice;
      isPaused = saved.isPaused ?? isPaused;
      tradeHistory = Array.isArray(saved.tradeHistory) ? saved.tradeHistory : tradeHistory;
      totalTrades = saved.totalTrades ?? totalTrades;
      consecutiveProfit = saved.consecutiveProfit ?? consecutiveProfit;
      crashCount = saved.crashCount ?? crashCount;
      wasInLoss = saved.wasInLoss ?? wasInLoss;
      holdingStart = saved.holdingStart ?? holdingStart;
      lastActionTime = saved.lastActionTime ?? lastActionTime;
      speedTrades = Array.isArray(saved.speedTrades) ? saved.speedTrades : speedTrades;
      boughtDuringEvent = saved.boughtDuringEvent ?? boughtDuringEvent;
      eventProfit = saved.eventProfit ?? eventProfit;
      activeEvent = saved.activeEvent ?? activeEvent;
      lastBuyPrice = saved.lastBuyPrice ?? lastBuyPrice;
      dayHigh = saved.dayHigh ?? dayHigh;
      dayLow = saved.dayLow ?? dayLow;
      candles = Array.isArray(saved.candles) ? saved.candles : candles;
      currentCandle = saved.currentCandle ?? currentCandle;
      chartMode = saved.chartMode ?? chartMode;
      linePoints = Array.isArray(saved.linePoints) ? saved.linePoints : linePoints;
    }
    unlocked = new Set(JSON.parse(localStorage.getItem('crc_ach') || '[]'));
  } catch (e) {
    console.warn('Load failed:', e);
  }
}

// ── INIT ──
updateUI();
loadGame();
setInterval(saveGame,30000);
drawChart();
updateOrderBook();
</script>
